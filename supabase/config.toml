project_id = "ntrr"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  # BEGIN LAN (auto-managed by npm run dev:lan — do not edit)
  # END LAN
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback/**",
  "http://127.0.0.1:3000/auth/callback/**",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false

[auth.email.template.magic_link]
subject = "Your NTRR sign-in link"
content_path = "./supabase/templates/magic_link.html"